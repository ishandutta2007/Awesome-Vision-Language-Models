<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c1b"/>
      <stop offset="50%" stop-color="#15102a"/>
      <stop offset="100%" stop-color="#06040a"/>
    </linearGradient>

    <!-- Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>

    <!-- Accent Glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>
  
  <!-- Grid overlay -->
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- Glow effects -->
  <circle cx="200" cy="100" r="300" fill="url(#glow)"/>
  <circle cx="1000" cy="300" r="350" fill="url(#glow)"/>

  <!-- Decorative Abstract Shapes (Neural Net Theme) -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5">
    <line x1="100" y1="80" x2="300" y2="150" />
    <line x1="300" y1="150" x2="250" y2="300" />
    <line x1="250" y1="300" x2="100" y2="80" />
    
    <line x1="950" y1="100" x2="1100" y2="180" />
    <line x1="1100" y1="180" x2="1020" y2="320" />
    <line x1="1020" y1="320" x2="950" y2="100" />
  </g>

  <!-- Glowing Nodes -->
  <g fill="#a855f7" opacity="0.3">
    <circle cx="100" cy="80" r="6" />
    <circle cx="300" cy="150" r="8" />
    <circle cx="250" cy="300" r="5" />
    <circle cx="950" cy="100" r="7" />
    <circle cx="1100" cy="180" r="9" />
    <circle cx="1020" cy="320" r="6" />
  </g>
  <g fill="#3b82f6" opacity="0.6">
    <circle cx="100" cy="80" r="3" />
    <circle cx="300" cy="150" r="3" />
    <circle cx="250" cy="300" r="2.5" />
    <circle cx="950" cy="100" r="3.5" />
    <circle cx="1100" cy="180" r="4.5" />
    <circle cx="1020" cy="320" r="3" />
  </g>

  <!-- Subtitle Label -->
  <rect x="475" y="110" width="250" height="28" rx="14" fill="#a855f7" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1"/>
  <text x="600" y="128" font-family="'Inter', system-ui, sans-serif" font-size="12" font-weight="600" fill="#ec4899" text-anchor="middle" letter-spacing="2">
    CURATED MULTIMODAL AI
  </text>

  <!-- Title Text -->
  <text x="600" y="210" font-family="'Outfit', 'Inter', system-ui, sans-serif" font-size="52" font-weight="800" fill="url(#textGrad)" text-anchor="middle" letter-spacing="1">
    AWESOME VISION-LANGUAGE MODELS
  </text>

  <!-- Description -->
  <text x="600" y="260" font-family="'Inter', system-ui, sans-serif" font-size="16" font-weight="400" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">
    Evolution, Variants, Modalities, Engineering Challenges &amp; Applications
  </text>
  
  <!-- Underline Deco -->
  <rect x="500" y="290" width="200" height="3" rx="1.5" fill="url(#textGrad)" opacity="0.8"/>
</svg>
